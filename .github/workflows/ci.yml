name: ci

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "fix/**"
      - "refactor/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    env:
      CI: "true"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Node dependencies
        shell: pwsh
        run: npm ci

      - name: Run Python syntax checks
        shell: pwsh
        run: python -m py_compile backend\core\agent_runtime.py backend\bot.py backend\bot_manager.py backend\api.py

      - name: Run Python regression tests
        shell: pwsh
        run: python -m pytest tests\test_smoke.py tests\test_api.py tests\test_runtime_observability.py tests\test_agent_runtime.py tests\test_optimization_tasks.py -q

      - name: Run Node tests
        shell: pwsh
        run: npm test
